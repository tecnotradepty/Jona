<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosco Gastronómico Panameño - Menú Regional</title>
  <style>
    :root {
      --gold-gradient: linear-gradient(135deg, #e6c875 0%, #d4af37 50%, #aa7c11 100%);
      --bg-dark: #0f1115;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(212, 175, 55, 0.2);
      --text-light: #f5f5f7;
      --text-muted: #a1a1a6;
      
      /* Pasteles */
      --pastel-pink: #ffd1dc;
      --pastel-peach: #ffe5b4;
      --pastel-cream: #fdfd96;
      --pastel-lavender: #e6e6fa;
      --pastel-green: #c1e1c1;
      --pastel-text: #2d2d2d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Top Bar Header */
    header {
      padding: 1.2rem 2rem;
      background: rgba(15, 17, 21, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .brand-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    /* Dynamic Menu Controls */
    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      color: #fff;
      outline: none;
      width: 200px;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      border-color: #d4af37;
      width: 240px;
    }

    /* Region Selector Dropdown & Preferential Toggle */
    .filter-select {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      outline: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .filter-select option {
      background: var(--bg-dark);
      color: #fff;
    }

    .btn-preferencial {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid #d4af37;
      color: #d4af37;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .btn-preferencial.active, .btn-preferencial:hover {
      background: var(--gold-gradient);
      color: #000;
    }

    /* Category Filter Nav */
    .category-nav {
      display: flex;
      gap: 0.8rem;
      padding: 1rem 2rem;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.2);
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      border-radius: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--gold-gradient);
      color: #000;
      font-weight: 600;
      border-color: transparent;
    }

    /* Menu Grid Container */
    .container {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      flex: 1;
    }

    .grid-menu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    /* Product Card with Liquid Gold & Pastel details */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
    }

    .card-img-wrapper {
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img {
      transform: scale(1.08);
    }

    /* Badges */
    .chip {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--pastel-text);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .region-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(212, 175, 55, 0.5);
      color: #e6c875;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    .star-preferencial {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #d4af37;
      color: #000;
      padding: 0.25rem 0.5rem;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .chip-pink { background-color: var(--pastel-pink); }
    .chip-peach { background-color: var(--pastel-peach); }
    .chip-cream { background-color: var(--pastel-cream); }
    .chip-lavender { background-color: var(--pastel-lavender); }
    .chip-green { background-color: var(--pastel-green); }

    .card-content {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 1rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .price {
      font-size: 1.25rem;
      font-weight: 800;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .add-btn {
      background: transparent;
      border: 1px solid #d4af37;
      color: #d4af37;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-btn:hover {
      background: var(--gold-gradient);
      color: #000;
    }

    footer {
      padding: 1rem 2rem;
      text-align: center;
      border-top: 1px solid var(--card-border);
      background: rgba(0,0,0,0.4);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>

        card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrapper">
            <span class="chip ${item.chip}">${item.tag}</span>
            ${item.preferencial ? '<span class="star-preferencial" title="Muy Buscado por Panameños">⭐</span>' : ''}
            <img src="${item.img}" alt="${item.nombre}" class="card-img" loading="lazy">
            <span class="region-badge">📍 ${item.provincia}</span>
          </div>
          <div class="card-content">
            <h3 class="card-title">${item.nombre}</h3>
            <p class="card-desc">${item.desc}</p>
            <div class="card-footer">
              <span class="price">${item.precio}</span>
              <button class="add-btn">Ordenar</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function filterCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function togglePreferencial() {
      onlyPreferencial = !onlyPreferencial;
      const btn = document.getElementById('btnPreferencial');
      if (onlyPreferencial) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
      applyFilters();
    }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const selectedProvincia = document.getElementById('selectProvincia').value;

      const filtered = platosPanama.filter(p => {
        const matchesCategory = activeCategory === 'Todos' || p.cat === activeCategory;
        const matchesProvincia = selectedProvincia === 'Todas' || p.provincia === selectedProvincia;
        const matchesPreferencial = !onlyPreferencial || p.preferencial === true;
        const matchesQuery = p.nombre.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query) || p.provincia.toLowerCase().includes(query);

        return matchesCategory && matchesProvincia && matchesPreferencial && matchesQuery;
      });

      renderMenu(filtered);
    }

    // Inicializar menú completo al cargar
    renderMenu(platosPanama);
  </script>
</body>
</html>
