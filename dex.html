<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosco Gastronómico Panameño - Menú & Reseñas</title>
  <style>
    :root {
      --gold-gradient: linear-gradient(135deg, #e6c875 0%, #d4af37 50%, #aa7c11 100%);
      --bg-dark: #0f1115;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(212, 175, 55, 0.2);
      --text-light: #f5f5f7;
      --text-muted: #a1a1a6;
      
      /* Pasteles */
      --pastel-pink: #ffd1dc;
      --pastel-peach: #ffe5b4;
      --pastel-cream: #fdfd96;
      --pastel-lavender: #e6e6fa;
      --pastel-green: #c1e1c1;
      --pastel-text: #2d2d2d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Header */
    header {
      padding: 1.2rem 2rem;
      background: rgba(15, 17, 21, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .brand-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box input, .filter-select {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      outline: none;
      font-size: 0.9rem;
    }

    .filter-select option {
      background: var(--bg-dark);
      color: #fff;
    }

    .btn-preferencial {
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid #d4af37;
      color: #d4af37;
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .btn-preferencial.active, .btn-preferencial:hover {
      background: var(--gold-gradient);
      color: #000;
    }

    /* Category Filter Nav */
    .category-nav {
      display: flex;
      gap: 0.8rem;
      padding: 1rem 2rem;
      overflow-x: auto;
      background: rgba(0, 0, 0, 0.2);
    }

    .cat-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      border-radius: 15px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--gold-gradient);
      color: #000;
      font-weight: 600;
      border-color: transparent;
    }

    /* Layout Main */
    .container {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      flex: 1;
      width: 100%;
    }

    .grid-menu {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    /* Product Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.15);
    }

    .card-img-wrapper {
      position: relative;
      width: 100%;
      height: 180px;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chip {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--pastel-text);
      text-transform: uppercase;
    }

    .region-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(212, 175, 55, 0.5);
      color: #e6c875;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .star-preferencial {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #d4af37;
      color: #000;
      padding: 0.25rem 0.5rem;
      border-radius: 50%;
      font-size: 0.8rem;
    }

    .chip-pink { background-color: var(--pastel-pink); }
    .chip-peach { background-color: var(--pastel-peach); }
    .chip-cream { background-color: var(--pastel-cream); }
    .chip-lavender { background-color: var(--pastel-lavender); }
    .chip-green { background-color: var(--pastel-green); }

    .card-content {
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
      margin-bottom: 1rem;
      flex: 1;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .price {
      font-size: 1.25rem;
      font-weight: 800;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .add-btn {
      background: transparent;
      border: 1px solid #d4af37;
      color: #d4af37;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      cursor: pointer;
    }

    .add-btn:hover {
      background: var(--gold-gradient);
      color: #000;
    }

    /* SECCIÓN DE COMENTARIOS Y RESEÑAS */
    .comments-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 2rem;
      margin-top: 2rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .comments-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    @media (max-width: 850px) {
      .comments-grid { grid-template-columns: 1fr; }
    }

    /* Formulario */
    .comment-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .form-control {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--card-border);
      padding: 0.7rem;
      border-radius: 8px;
      color: #fff;
      outline: none;
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .submit-btn {
      background: var(--gold-gradient);
      color: #000;
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .submit-btn:hover {
      opacity: 0.9;
    }

    /* Comentarios Feed */
    .comments-feed {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }

    .comment-card {
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid #d4af37;
      padding: 1rem;
      border-radius: 0 10px 10px 0;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .comment-author {
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
    }

    .comment-dish {
      font-size: 0.75rem;
      background: rgba(212, 175, 55, 0.2);
      color: #e6c875;
      padding: 0.1rem 0.5rem;
      border-radius: 10px;
    }

    .comment-stars {
      color: #ffd700;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }

    .comment-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    footer {
      padding: 1rem 2rem;
      text-align: center;
      border-top: 1px solid var(--card-border);
      background: rgba(0,0,0,0.4);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="brand-logo">SABORES DE PANAMÁ</div>
    <div class="controls">
      <button class="btn-preferencial" id="btnPreferencial" onclick="togglePreferencial()">
        ⭐ Los Más Buscados
      </button>

      <select class="filter-select" id="selectProvincia" onchange="applyFilters()">
        <option value="Todas">📍 Todas las Provincias y Comarcas</option>
        <option value="Panamá">Panamá</option>
        <option value="Panamá Oeste">Panamá Oeste</option>
        <option value="Colón">Colón</option>
        <option value="Coclé">Coclé</option>
        <option value="Herrera">Herrera</option>
        <option value="Los Santos">Los Santos</option>
        <option value="Veraguas">Veraguas</option>
        <option value="Chiriquí">Chiriquí</option>
        <option value="Bocas del Toro">Bocas del Toro</option>
        <option value="Darién">Darién</option>
        <option value="Comarca Guna Yala">Comarca Guna Yala</option>
        <option value="Comarca Ngäbe-Buglé">Comarca Ngäbe-Buglé</option>
      </select>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar plato..." onkeyup="applyFilters()">
      </div>
    </div>
  </header>

  <!-- Category Filter Bar -->
  <nav class="category-nav">
    <button class="cat-btn active" onclick="filterCategory('Todos', this)">Todos (30)</button>
    <button class="cat-btn" onclick="filterCategory('Desayunos', this)">Desayunos & Frituras</button>
    <button class="cat-btn" onclick="filterCategory('Platos Fuertes', this)">Platos Fuertes</button>
    <button class="cat-btn" onclick="filterCategory('Mariscos', this)">Mariscos & Costas</button>
    <button class="cat-btn" onclick="filterCategory('Postres', this)">Postres Típicos</button>
    <button class="cat-btn" onclick="filterCategory('Bebidas', this)">Bebidas Tradicionales</button>
  </nav>

  <!-- Main Grid & Comments -->
  <main class="container">
    <div class="grid-menu" id="menuGrid"></div>

    <!-- Sección de Comentarios Integrada -->
    <section class="comments-section">
      <h2 class="section-title">💬 Comentarios & Reseñas Populares</h2>
      <div class="comments-grid">
        
        <!-- Formulario para agregar comentarios -->
        <form class="comment-form" onsubmit="agregarComentario(event)">
          <div class="form-group">
            <label for="userName">Tu Nombre:</label>
            <input type="text" id="userName" class="form-control" placeholder="Ej. Carlos de David" required>
          </div>
          <div class="form-group">
            <label for="dishSelect">Selecciona el Plato:</label>
            <select id="dishSelect" class="form-control" required></select>
          </div>
          <div class="form-group">
            <label for="starRating">Calificación:</label>
            <select id="starRating" class="form-control">
              <option value="5">⭐⭐⭐⭐⭐ (Excelente)</option>
              <option value="4">⭐⭐⭐⭐ (Muy Bueno)</option>
              <option value="3">⭐⭐⭐ (Bueno)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="commentText">Tu Reseña:</label>
            <textarea id="commentText" class="form-control" placeholder="¿Qué tal estuvo el sazón?" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Publicar Comentario</button>
        </form>

        <!-- Lista de Comentarios Populares -->
        <div class="comments-feed" id="commentsFeed"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>Kiosco Interactivo • Base Oficial con Selección Preferencial, Regiones y Comentarios de la Comunidad</p>
  </footer>

  <script>
    // 1. Base de Datos de Platos
    const platosPanama = [
      { id: 1, nombre: "Hojaldra con Queso Blanco", cat: "Desayunos", provincia: "Panamá", preferencial: true, chip: "chip-cream", tag: "Tradicional", desc: "Masa frita esponjosa acompañada de suave queso blanco artesanal.", precio: "$4.50", img: "https://images.unsplash.com/photo-1589301760014-d929f3979dbc?auto=format&fit=crop&w=600&q=80" },
      { id: 2, nombre: "Carimañolas de Carne", cat: "Desayunos", provincia: "Coclé", preferencial: true, chip: "chip-pink", tag: "Entrada", desc: "Fritura de yuca suave rellena de carne picada sazonada al estilo criollo.", precio: "$5.00", img: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?auto=format&fit=crop&w=600&q=80" },
      { id: 3, nombre: "Tortilla con Chicharrón", cat: "Desayunos", provincia: "Herrera", preferencial: true, chip: "chip-pink", tag: "Típico", desc: "Gruesa tortilla de maíz asada acompañada de crujiente chicharrón.", precio: "$6.50", img: "https://images.unsplash.com/photo-1541518763669-27fef04b14e8?auto=format&fit=crop&w=600&q=80" },
      { id: 4, nombre: "Sancocho Panameño", cat: "Platos Fuertes", provincia: "Herrera", preferencial: true, chip: "chip-pink", tag: "Sopa Insignia", desc: "Sopa tradicional con gallina dura, ñame, culantro fresco y arroz.", precio: "$12.00", img: "https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=600&q=80" },
      { id: 5, nombre: "Ropa Vieja con Arroz de Coco", cat: "Platos Fuertes", provincia: "Colón", preferencial: true, chip: "chip-pink", tag: "Favorito", desc: "Carne deshilachada en salsa criolla servida con arroz de coco.", precio: "$14.50", img: "https://images.unsplash.com/photo-1588168333986-5078d3ae3976?auto=format&fit=crop&w=600&q=80" },
      { id: 6, nombre: "Pescado Frito con Patacones", cat: "Mariscos", provincia: "Colón", preferencial: true, chip: "chip-peach", tag: "Afroantillano", desc: "Pargo rojo frito y sazonado, acompañado de patacones crocantes.", precio: "$18.00", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?auto=format&fit=crop&w=600&q=80" },
      { id: 7, nombre: "Ceviche de Corvina", cat: "Mariscos", provincia: "Panamá", preferencial: true, chip: "chip-peach", tag: "Fresco", desc: "Corvina marinada en limón criollo, cebolla, ají chombo y galletas.", precio: "$9.50", img: "https://images.unsplash.com/photo-1535400255456-984241443b29?auto=format&fit=crop&w=600&q=80" },
      { id: 8, nombre: "Pesada de Nance", cat: "Postres", provincia: "Herrera", preferencial: true, chip: "chip-lavender", tag: "Autóctono", desc: "Crema agridulce de nance con raspadura y queso blanco espolvoreado.", precio: "$5.50", img: "https://images.unsplash.com/photo-1551024709-8f23befc6f87?auto=format&fit=crop&w=600&q=80" },
      { id: 9, nombre: "Chicheme Chorrerano", cat: "Bebidas", provincia: "Panamá Oeste", preferencial: true, chip: "chip-cream", tag: "Ícono", desc: "Bebida cremosa de maíz pilado, leche, vainilla y canela helada.", precio: "$4.00", img: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=600&q=80" }
    ];

    // 2. Comentarios Populares Iniciales
    const comentariosPopulares = [
      { autor: "María G. (La Chorrera)", plato: "Chicheme Chorrerano", estrellas: 5, texto: "¡El mejor chicheme de todo Panamá Oeste! Dulce en su punto exacto y bien frío." },
      { autor: "José L. (Chitré)", plato: "Sancocho Panameño", estrellas: 5, texto: "Sabe exactamente al que hace mi abuela en el interior. El toque de culantro es perfecto." },
      { autor: "Yarielis N. (Colón)", plato: "Pescado Frito con Patacones", estrellas: 5, texto: "El pargo super crujiente por fuera y jugoso por dentro. Los patacones bien tostados." },
      { autor: "Esteban M. (Chiriquí)", plato: "Hojaldra con Queso Blanco", estrellas: 4, texto: "La masa es sumamente suave y no queda aceitosa. Recomendada para el desayuno." }
    ];

    let activeCategory = 'Todos';
    let onlyPreferencial = false;

    // Renderizar Menú
    function renderMenu(items) {
      const grid = document.getElementById('menuGrid');
      grid.innerHTML = '';

      if (items.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 3rem;">No se encontraron platos para la selección realizada.</p>`;
        return;
      }
      
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrapper">
            <span class="chip ${item.chip}">${item.tag}</span>
            ${item.preferencial ? '<span class="star-preferencial">⭐</span>' : ''}
            <img src="${item.img}" alt="${item.nombre}" class="card-img" loading="lazy">
            <span class="region-badge">📍 ${item.provincia}</span>
          </div>
          <div class="card-content">
            <h3 class="card-title">${item.nombre}</h3>
            <p class="card-desc">${item.desc}</p>
            <div class="card-footer">
              <span class="price">${item.precio}</span>
              <button class="add-btn">Ordenar</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Renderizar Comentarios Feed
    function renderComentarios() {
      const feed = document.getElementById('commentsFeed');
      feed.innerHTML = '';

      comentariosPopulares.forEach(c => {
        const div = document.createElement('div');
        div.className = 'comment-card';
        div.innerHTML = `
          <div class="comment-header">
            <span class="comment-author">${c.autor}</span>
            <span class="comment-dish">${c.plato}</span>
          </div>
          <div class="comment-stars">${'⭐'.repeat(c.estrellas)}</div>
          <p class="comment-text">"${c.texto}"</p>
        `;
        feed.appendChild(div);
      });
    }

    // Cargar Lista de Platos en el Select del Formulario
    function loadDishOptions() {
      const select = document.getElementById('dishSelect');
      select.innerHTML = '';
      platosPanama.forEach(p => {
        const option = document.createElement('option');
        option.value = p.nombre;
        option.textContent = `${p.nombre} (${p.provincia})`;
        select.appendChild(option);
      });
    }

    // Agregar Comentario
    function agregarComentario(e) {
      e.preventDefault();
      const autor = document.getElementById('userName').value;
      const plato = document.getElementById('dishSelect').value;
      const estrellas = parseInt(document.getElementById('starRating').value);
      const texto = document.getElementById('commentText').value;

      // Insertar al inicio de la lista
      comentariosPopulares.unshift({ autor, plato, estrellas, texto });
      renderComentarios();

      // Limpiar formulario
      document.getElementById('userName').value = '';
      document.getElementById('commentText').value = '';
      alert('¡Gracias! Tu comentario ha sido publicado.');
    }

    // Filtros
    function filterCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function togglePreferencial() {
      onlyPreferencial = !onlyPreferencial;
      document.getElementById('btnPreferencial').classList.toggle('active', onlyPreferencial);
      applyFilters();
    }

    function applyFilters() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const selectedProvincia = document.getElementById('selectProvincia').value;

      const filtered = platosPanama.filter(p => {
        const matchesCategory = activeCategory === 'Todos' || p.cat === activeCategory;
        const matchesProvincia = selectedProvincia === 'Todas' || p.provincia === selectedProvincia;
        const matchesPreferencial = !onlyPreferencial || p.preferencial === true;
        const matchesQuery = p.nombre.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query) || p.provincia.toLowerCase().includes(query);

        return matchesCategory && matchesProvincia && matchesPreferencial && matchesQuery;
      });

      renderMenu(filtered);
    }

    // Inicialización
    renderMenu(platosPanama);
    renderComentarios();
    loadDishOptions();
  </script>
</body>
</html>
