<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NXT | Future Wear</title>

    <!-- CSS NXT -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

<header class="nxt-header">

    <div class="nxt-logo">
        NXT
    </div>

    <nav class="nxt-menu">
        <a href="#">Inicio</a>
        <a href="#">Colección</a>
        <a href="#">Tienda</a>
        <a href="#">Contacto</a>
    </nav>


    <div class="nxt-search">
        <input 
        type="search" 
        placeholder="Buscar productos...">

        <button>
            🔍
        </button>
    </div>

</header>



<section class="nxt-hero">

    <div class="hero-content">

        <h1>
            NUEVA ERA.
            <br>
            NUEVO ESTILO.
        </h1>

        <p>
            Ropa diseñada para quienes buscan
            evolucionar sin seguir tendencias.
        </p>


        <button class="nxt-button">
            Explorar colección
        </button>

    </div>


    <div class="hero-image">

        <div class="product-preview">
            NXT
        </div>

    </div>


</section>




<section class="nxt-products">


<h2>
Colección destacada
</h2>


<div class="product-grid">


<div class="card">
    <h3>
    Oversize Black
    </h3>

    <p>
    Minimal Edition
    </p>

    <button>
    Ver producto
    </button>

</div>



<div class="card">
    <h3>
    Urban Future
    </h3>

    <p>
    Street Collection
    </p>

    <button>
    Ver producto
    </button>

</div>



<div class="card">
    <h3>
    Premium Line
    </h3>

    <p>
    Limited Drop
    </p>

    <button>
    Ver producto
    </button>

</div>


</div>

</section>



<footer>

<p>
© 2026 NXT Clothing
</p>

</footer>


</body>
</html>
